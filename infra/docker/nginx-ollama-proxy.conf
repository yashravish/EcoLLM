server {
    listen 80;

    # Health-check stub: gateway polls /api/metrics which Ollama doesn't expose.
    # Return 200 so the gateway marks models as healthy.
    location = /api/metrics {
        add_header Content-Type application/json;
        return 200 '{}';
    }

    # Strip /api prefix: /api/v1/chat/completions -> /v1/chat/completions
    location ~ ^/api(/.*)$ {
        proxy_pass http://ollama:11434$1;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host ollama:11434;
        proxy_set_header Connection '';
    }

    location / {
        proxy_pass http://ollama:11434;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host ollama:11434;
        proxy_set_header Connection '';
    }
}
