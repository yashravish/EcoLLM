version: "3.9"

# Isolated integration test stack.
# Usage: docker compose -f docker-compose.test.yml up --abort-on-container-exit
# All services use ephemeral volumes; data is discarded after the run.

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecollm_test
      POSTGRES_USER: ecollm_test
      POSTGRES_PASSWORD: ecollm_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecollm_test -d ecollm_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    command: redis-server --save ""
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate-test:
    image: migrate/migrate:v4.17.0
    volumes:
      - ./../../db/migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://ecollm_test:ecollm_test@postgres-test:5432/ecollm_test?sslmode=disable"
      - "up"
    depends_on:
      postgres-test:
        condition: service_healthy

  api-test:
    build:
      context: ./../../apps/api
      dockerfile: Dockerfile
      target: test
    environment:
      DATABASE_URL: postgres://ecollm_test:ecollm_test@postgres-test:5432/ecollm_test?sslmode=disable
      REDIS_URL: redis://redis-test:6379
      JWT_SECRET: test-jwt-secret-not-for-production
      LOG_LEVEL: warn
      GRID_REGION: US-EAST
      ENABLE_CARBON_TRACKING: "true"
      ENABLE_CACHE: "true"
      ENABLE_FALLBACK: "true"
      ENABLE_PROMPT_OPTIMIZATION: "false"
      INFERENCE_PHI3_URL: http://mock-inference:9999/phi3
      INFERENCE_MISTRAL_URL: http://mock-inference:9999/mistral
      INFERENCE_LLAMA13B_URL: http://mock-inference:9999/llama13b
      INFERENCE_LLAMA70B_URL: http://mock-inference:9999/llama70b
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      migrate-test:
        condition: service_completed_successfully

networks:
  default:
    name: ecollm_test
