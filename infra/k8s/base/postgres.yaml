apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ecollm-postgres
  namespace: ecollm
  labels:
    app: ecollm-postgres
spec:
  serviceName: ecollm-postgres
  replicas: 1
  selector:
    matchLabels:
      app: ecollm-postgres
  template:
    metadata:
      labels:
        app: ecollm-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ecollm
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: ecollm-api-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecollm-api-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ecollm"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ecollm"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ecollm-postgres
  namespace: ecollm
spec:
  selector:
    app: ecollm-postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
