apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecollm-api
  namespace: ecollm
  labels:
    app: ecollm-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecollm-api
  template:
    metadata:
      labels:
        app: ecollm-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ecollm/api:latest
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9091
          envFrom:
            - secretRef:
                name: ecollm-api-secrets
            - configMapRef:
                name: ecollm-api-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: ecollm-api
  namespace: ecollm
spec:
  selector:
    app: ecollm-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: metrics
      port: 9091
      targetPort: 9091
