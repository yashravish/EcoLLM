apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecollm-carbon-service
  namespace: ecollm
  labels:
    app: ecollm-carbon-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecollm-carbon-service
  template:
    metadata:
      labels:
        app: ecollm-carbon-service
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: carbon-service
          image: ecollm/carbon-service:latest
          ports:
            - name: http
              containerPort: 8091
          env:
            - name: GRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ecollm-api-secrets
                  key: GRID_API_KEY
          envFrom:
            - configMapRef:
                name: ecollm-api-config
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ecollm-carbon-service
  namespace: ecollm
spec:
  selector:
    app: ecollm-carbon-service
  ports:
    - name: http
      port: 80
      targetPort: 8091
