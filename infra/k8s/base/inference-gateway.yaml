apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecollm-inference-gateway
  namespace: ecollm
  labels:
    app: ecollm-inference-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecollm-inference-gateway
  template:
    metadata:
      labels:
        app: ecollm-inference-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: inference-gateway
          image: ecollm/inference-gateway:latest
          ports:
            - name: http
              containerPort: 8090
            - name: metrics
              containerPort: 9092
          envFrom:
            - configMapRef:
                name: ecollm-api-config
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: ecollm-inference-gateway
  namespace: ecollm
spec:
  selector:
    app: ecollm-inference-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8090
    - name: metrics
      port: 9092
      targetPort: 9092
