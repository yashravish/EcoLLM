apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ecollm-redis
  namespace: ecollm
  labels:
    app: ecollm-redis
spec:
  serviceName: ecollm-redis
  replicas: 1
  selector:
    matchLabels:
      app: ecollm-redis
  template:
    metadata:
      labels:
        app: ecollm-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args: ["--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ecollm-redis
  namespace: ecollm
spec:
  selector:
    app: ecollm-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
