# Secret values are base64-encoded. In production use Sealed Secrets or
# an external secrets operator (e.g., External Secrets Operator + AWS SSM).
# The values below are PLACEHOLDERS — replace before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: ecollm-api-secrets
  namespace: ecollm
type: Opaque
stringData:
  DATABASE_URL: "postgres://ecollm:CHANGE_ME@postgres:5432/ecollm?sslmode=require"
  REDIS_URL: "redis://:CHANGE_ME@redis:6379/0"
  JWT_SECRET: "CHANGE_ME_min_32_chars_random_secret"
  GRID_API_KEY: "CHANGE_ME"
