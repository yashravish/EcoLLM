apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecollm-ingress
  namespace: ecollm
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ecollm.io
        - app.ecollm.io
      secretName: ecollm-tls
  rules:
    - host: api.ecollm.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecollm-api
                port:
                  number: 80
    - host: app.ecollm.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecollm-web
                port:
                  number: 80
