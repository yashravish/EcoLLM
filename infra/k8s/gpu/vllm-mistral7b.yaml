apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistral-sidecar
  namespace: ecollm
  labels:
    app: mistral-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mistral-sidecar
  template:
    metadata:
      labels:
        app: mistral-sidecar
    spec:
      nodeSelector:
        accelerator: nvidia-gpu
        nvidia.com/gpu.product: NVIDIA-A10G
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: mistral
          image: ecollm/mistral-vllm:latest
          ports:
            - containerPort: 8082
          env:
            - name: MODEL_NAME
              value: "mistralai/Mistral-7B-Instruct-v0.2"
            - name: QUANTIZATION
              value: "awq"
            - name: MAX_MODEL_LEN
              value: "8192"
            - name: PORT
              value: "8082"
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 150
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mistral-sidecar
  namespace: ecollm
spec:
  selector:
    app: mistral-sidecar
  ports:
    - port: 8082
      targetPort: 8082
