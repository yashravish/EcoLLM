apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama70b-sidecar
  namespace: ecollm
  labels:
    app: llama70b-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama70b-sidecar
  template:
    metadata:
      labels:
        app: llama70b-sidecar
    spec:
      nodeSelector:
        accelerator: nvidia-gpu
        nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: llama70b
          image: ecollm/llama70b-vllm:latest
          ports:
            - containerPort: 8084
          env:
            - name: MODEL_NAME
              value: "meta-llama/Llama-2-70b-chat-hf"
            - name: QUANTIZATION
              value: "awq"
            - name: TENSOR_PARALLEL_SIZE
              value: "2"
            - name: MAX_MODEL_LEN
              value: "4096"
            - name: PORT
              value: "8084"
          resources:
            requests:
              cpu: "8"
              memory: "80Gi"
              nvidia.com/gpu: "2"
            limits:
              cpu: "16"
              memory: "160Gi"
              nvidia.com/gpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 240
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: llama70b-sidecar
  namespace: ecollm
spec:
  selector:
    app: llama70b-sidecar
  ports:
    - port: 8084
      targetPort: 8084
