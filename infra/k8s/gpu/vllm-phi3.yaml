apiVersion: apps/v1
kind: Deployment
metadata:
  name: phi3-sidecar
  namespace: ecollm
  labels:
    app: phi3-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phi3-sidecar
  template:
    metadata:
      labels:
        app: phi3-sidecar
    spec:
      nodeSelector:
        accelerator: nvidia-gpu
        nvidia.com/gpu.product: NVIDIA-A10G
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: phi3
          image: ecollm/phi3-vllm:latest
          ports:
            - containerPort: 8081
          env:
            - name: MODEL_NAME
              value: "microsoft/Phi-3-mini-4k-instruct"
            - name: QUANTIZATION
              value: "awq"
            - name: MAX_MODEL_LEN
              value: "4096"
            - name: PORT
              value: "8081"
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: phi3-sidecar
  namespace: ecollm
spec:
  selector:
    app: phi3-sidecar
  ports:
    - port: 8081
      targetPort: 8081
