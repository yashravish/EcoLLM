apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama13b-sidecar
  namespace: ecollm
  labels:
    app: llama13b-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama13b-sidecar
  template:
    metadata:
      labels:
        app: llama13b-sidecar
    spec:
      nodeSelector:
        accelerator: nvidia-gpu
        nvidia.com/gpu.product: NVIDIA-A10G
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: llama13b
          image: ecollm/llama13b-vllm:latest
          ports:
            - containerPort: 8083
          env:
            - name: MODEL_NAME
              value: "meta-llama/Llama-2-13b-chat-hf"
            - name: QUANTIZATION
              value: "awq"
            - name: MAX_MODEL_LEN
              value: "4096"
            - name: PORT
              value: "8083"
          resources:
            requests:
              cpu: "4"
              memory: "20Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 180
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: llama13b-sidecar
  namespace: ecollm
spec:
  selector:
    app: llama13b-sidecar
  ports:
    - port: 8083
      targetPort: 8083
