apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecollm

resources:
  - ../../base
  - ../../gpu

commonLabels:
  env: production

patches:
  - target:
      kind: Deployment
      name: ecollm-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: ecollm-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: ecollm-inference-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
