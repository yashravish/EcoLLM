global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ecollm-dev

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: ecollm-api
    static_configs:
      - targets: ["api:9091"]
    metrics_path: /metrics

  - job_name: ecollm-inference-gateway
    static_configs:
      - targets: ["inference-gateway:9092"]
    metrics_path: /metrics

  - job_name: ecollm-carbon-service
    static_configs:
      - targets: ["carbon-service:9093"]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
    metrics_path: /metrics

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
